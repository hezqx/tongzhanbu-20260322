<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Swiper5 轮播图</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper@5.4.5/css/swiper.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            box-sizing: border-box;
        }
        .swiper-container {
            width: 100%;
            height: 380px;
        }
        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ffffff;
        }
        .slide1 { background: #4e79a7; }
        .slide2 { background: #f28e2b; }
        .slide3 { background: #e15759; }
    </style>
    <link rel="preconnect" href="https://unpkg.com">
</head>
<body>
    <div class="container">
        <div class="swiper-container">
            <div class="swiper-wrapper">
                <div class="swiper-slide slide1">幻灯片 1</div>
                <div class="swiper-slide slide2">幻灯片 2</div>
                <div class="swiper-slide slide3">幻灯片 3</div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-scrollbar"></div>
        </div>
    </div>
    <script src="https://unpkg.com/swiper@5.4.5/js/swiper.min.js"></script>
    <script>
        var swiper = new Swiper('.swiper-container', {
            loop: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev'
            },
            scrollbar: {
                el: '.swiper-scrollbar',
                draggable: true
            }
        });
    </script>
</body>
</html>
